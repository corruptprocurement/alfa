<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/vega@6.2.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@7.1.0"></script>
</head>
<body>
  <div id="vis"/>
  <script>
    const spec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
  "title": "ППДБ - Разпределение на преференциалния вот на парламентарни избори 2026",
  "background": "#fff7d3",
  "data": {
    "url": "https://raw.githubusercontent.com/corruptprocurement/alfa/refs/heads/main/ppdb_final.csv",
    "format": {"type": "csv"}
  },
  "transform": [
    {"calculate": "toNumber(datum.candidate_number)", "as": "cand_number"},
    {"calculate": "toNumber(datum.mir_norm)", "as": "mir_norm_num"},
    {
      "aggregate": [{"op": "sum", "field": "votes", "as": "pref_votes"}],
      "groupby": ["cand_number", "mir_norm_num", "candidate_name"]
    },
    {
      "calculate": "datum.mir_norm_num < 10 ? '0' + datum.mir_norm_num : datum.mir_norm_num",
      "as": "mir_norm"
    },
    {"calculate": "datum.candidate_name", "as": "name"}
  ],
  "width": 934,
  "height": 900,
  "mark": {
    "type": "circle",
    "opacity": 0.8,
    "stroke": "black",
    "strokeWidth": 1,
    "color": "#FFF81F"
  },
  "encoding": {
    "x": {
      "field": "cand_number",
      "type": "ordinal",
      "axis": {"grid": false, "title": "Кандидат номер"}
    },
    "y": {"field": "mir_norm", "type": "ordinal", "axis": {"title": "МИР"}},
    "size": {
      "field": "pref_votes",
      "type": "quantitative",
      "scale": {"rangeMax": 5000}
    },
    "tooltip": [
      {"field": "mir_norm", "type": "ordinal", "title": "МИР"},
      {"field": "cand_number", "type": "ordinal", "title": "Номер"},
      {"field": "name", "type": "nominal", "title": "Кандидат"},
      {"field": "pref_votes", "type": "quantitative", "title": "Преференции"}
    ]
  },
  "config": {"legend": {"disable": true}}
};
    vegaEmbed("#vis", spec, {mode: "vega-lite"}).then(console.log).catch(console.warn);
  </script>
</body>
</html>
